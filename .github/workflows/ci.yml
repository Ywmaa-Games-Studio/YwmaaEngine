name: CI
on:
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**.md"
      - "LICENSE**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**.md"
      - "LICENSE**"
jobs:
  x86_64-linux:
    runs-on: ubuntu-latest
    # We want to run on external PRs, but not on our own internal PRs as they'll be run by the push
    # to the branch.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Zig
        run: |
          sudo apt install xz-utils
          sudo sh -c 'wget -c https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz -O - | tar -xJ --strip-components=1 -C /usr/local/bin'
      - name: Install Engine Dependencies
        run: |
          sudo apt install -y libwayland-dev libwayland-bin
#libx11-dev libxkbcommon-x11-dev libx11-xcb-dev
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: latest
          cache: true
      - name: x86_64-linux
        run: zig build -Doptimize=ReleaseFast
      - name: x86_64-linux -> x86_64-linux-musl
        run: zig build -Dtarget=x86_64-linux-musl
      #- name: x86_64-linux -> x86_64-macos No mac os backend, yet.
      #  run: zig build -Dtarget=x86_64-macos
      #- name: x86_64-linux -> aarch64-macos No mac os backend, yet.
      #  run: zig build -Dtarget=aarch64-macos
      - name: x86_64-linux -> x86_64-windows
        run: zig build -Dtarget=x86_64-windows -Doptimize=ReleaseFast
