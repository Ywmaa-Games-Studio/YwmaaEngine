name: CI
on:
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**.md"
      - "LICENSE**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**.md"
      - "LICENSE**"
jobs:
  x86_64-linux:
    runs-on: ubuntu-latest
    # We want to run on external PRs, but not on our own internal PRs as they'll be run by the push
    # to the branch.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Zig
        run: |
          sudo apt install xz-utils
          sudo sh -c 'wget -c https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz -O - | tar -xJ --strip-components=1 -C /usr/local/bin'
      - name: Install Engine Dependencies
        run: |
          sudo apt install -y libx11-dev libxkbcommon-x11-dev libx11-xcb-dev
      - name: Install Vulkan Dependencies
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list http://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install vulkan-sdk
      - name: x86_64-linux
        run: zig build
      #- name: x86_64-linux -> x86_64-linux-musl
      #  run: zig build -Dtarget=x86_64-linux-musl
      #- name: x86_64-linux -> x86_64-macos Cross-compile is not working, yet.
      #  run: zig build -Dtarget=x86_64-macos
      #- name: x86_64-linux -> aarch64-macos Cross-compile is not working, yet.
      #  run: zig build -Dtarget=aarch64-macos
      #- name: x86_64-linux -> x86_64-windows Cross-compile is not working, yet.
      #  run: zig build -Dtarget=x86_64-windows-gnu
  x86_64-windows:
    runs-on: windows-latest
    # We want to run on external PRs, but not on our own internal PRs as they'll be run by the push
    # to the branch.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Zig
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri 'https://ziglang.org/download/0.13.0/zig-windows-x86_64-0.13.0.zip' -OutFile 'C:\zig.zip'
          cd C:\
          7z x zig.zip
          Add-Content $env:GITHUB_PATH 'C:\zig-windows-x86_64-0.13.0\'
      - name: Install Vulkan Dependencies
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri 'https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe' -OutFile 'C:\vulkan-sdk.exe'
          cd C:\
          vulkan-sdk.exe --accept-licenses --default-answer --confirm-command install
      - name: Build
        run: zig build
